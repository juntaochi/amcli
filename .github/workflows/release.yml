name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Verify release
    runs-on: macos-14
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Validate tag and package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use vMAJOR.MINOR.PATCH format"
            exit 1
          fi

          package_version=$(cargo metadata --no-deps --format-version 1 | \
            jq -r '.packages[] | select(.name == "amcli") | .version')

          if [[ "v${package_version}" != "$RELEASE_TAG" ]]; then
            echo "::error::Tag ${RELEASE_TAG} does not match Cargo.toml version ${package_version}"
            exit 1
          fi

      - name: Run project verification
        run: make verify

  build-macos:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release asset
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          archive="amcli-${RELEASE_TAG}-${RELEASE_ARCH}-apple-darwin.tar.gz"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          tar -C "target/${RELEASE_TARGET}/release" \
            -czf "$GITHUB_WORKSPACE/dist/${archive}" amcli
          cd "$GITHUB_WORKSPACE/dist"
          shasum -a 256 "$archive" > "${archive}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          file_count=$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [[ "$file_count" != "4" ]]; then
            echo "::error::Expected 4 release files, found ${file_count}"
            find dist -maxdepth 1 -type f -print
            exit 1
          fi

          cd dist
          shasum -a 256 -c ./*.sha256

      - name: Publish release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "AMCLI ${RELEASE_TAG}"
