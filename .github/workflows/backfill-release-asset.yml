name: Backfill Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to backfill, for example v0.2.1'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-x86_64:
    name: Build x86_64 macOS asset
    runs-on: macos-15-intel
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create archive
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf amcli-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz amcli
          shasum -a 256 amcli-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz > amcli-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz.sha256

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            "target/x86_64-apple-darwin/release/amcli-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz" \
            "target/x86_64-apple-darwin/release/amcli-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz.sha256" \
            --clobber
